<!DOCTYPE html>
<html>
<head>
<title>AMIT CHEAT SITE</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#041a38,#0b3c6d);
height:100vh;
}

.box{
width:360px;
padding:40px;
border-radius:25px;
border:3px solid #00eaff;
text-align:center;
box-shadow:0 0 40px #00eaff;
background:#113b64;

/* CENTER FIX */
position:fixed;
top:55%;
left:50%;
transform:translate(-50%,-50%);
}

.logo{
width:110px;
height:110px;
border-radius:50%;
border:5px solid #00eaff;
box-shadow:0 0 25px #00eaff;
}

.title{
font-size:28px;
color:#00eaff;
font-weight:bold;
margin-top:10px;
}

.sub{
color:#c9f3ff;
margin-bottom:15px;
}

.server{
background:#173b63;
padding:10px 25px;
border-radius:10px;
display:inline-block;
margin-bottom:20px;
}

.getkey{
width:100%;
padding:15px;
font-size:22px;
border:none;
border-radius:15px;
font-weight:bold;
cursor:pointer;
color:black;
background:linear-gradient(90deg,#00d2ff,#00ff94);
}

.verify{
margin-top:20px;
color:#00eaff;
font-size:18px;
}

.time{
font-size:32px;
color:#00ff9d;
}

</style>

</head>

<body>

<div class="box">

<img src="YOUR_LOGO_LINK" class="logo">

<div class="title">AMIT CHEAT – SITE</div>

<div class="sub">Generate Panel Access Key</div>

<div class="server">Server 1 (Fast)</div>

<br>

<button class="getkey" onclick="start()">GET KEY</button>

<div class="verify" id="verify" style="display:none;">
🔒 VERIFYING...<br>
Please wait 3 seconds
</div>

<div class="time" id="time"></div>

</div>

<script>

let seconds=3;

function start(){

document.getElementById("verify").style.display="block";

let timer=setInterval(function(){

seconds--;

document.getElementById("time").innerHTML=seconds+"s";

if(seconds<=0){

clearInterval(timer);

window.location.href="https://t.me/amitcheatz";

}

},1000);

}

</script>

</body>
</html>
