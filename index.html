<!DOCTYPE html>
<html>
<head>
<title>AMIT CHEAT  - SITE</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#041a38,#0a3563);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.box{
width:350px;
padding:40px;
border-radius:20px;
border:2px solid #00eaff;
text-align:center;
box-shadow:0 0 25px #00eaff;
background:rgba(0,0,0,0.2);
}

.logo{
width:110px;
height:110px;
border-radius:50%;
border:4px solid #00eaff;
box-shadow:0 0 20px #00eaff;
margin-bottom:15px;
}

.title{
font-size:26px;
color:#00eaff;
font-weight:bold;
}

.sub{
color:#c9f3ff;
margin-bottom:20px;
}

.server{
background:#0f2f55;
padding:10px 25px;
border-radius:10px;
display:inline-block;
margin-bottom:20px;
}

.getkey{
width:100%;
padding:15px;
font-size:20px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
color:black;
background:linear-gradient(90deg,#00eaff,#00ff9d);
}

.verify{
margin-top:25px;
color:#00eaff;
font-size:18px;
}

.time{
font-size:35px;
color:#00ff9d;
margin-top:5px;
}

</style>

</head>

<body>

<div class="box">

<div class="title">GRINGO XP – SITE</div>

<div class="sub">Generate Panel Access Key</div>

<div class="server">Server 1 (Fast)</div>

<br><br>

<button class="getkey" onclick="start()">GET KEY</button>

<div class="verify" id="verify" style="display:none;">
🔒 VERIFYING...
<br>
Please wait 30 seconds
</div>

<div class="time" id="time"></div>

</div>

<script>

let seconds=30;

function start(){

document.getElementById("verify").style.display="block";

let timer=setInterval(function(){

seconds--;

document.getElementById("time").innerHTML=seconds+"s";

if(seconds<=0){

clearInterval(timer);

window.location.href="https://adsfly.in/iR7ve";

}

},1000);

}

</script>

</body>
</html>
